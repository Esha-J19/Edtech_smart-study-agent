<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Material</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  height:100vh;
  background:
    radial-gradient(circle at top left,#0ea5e9,transparent 40%),
    radial-gradient(circle at bottom right,#38bdf8,transparent 45%),
    linear-gradient(135deg,#020617,#0f172a);
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:1000px;
  height: 500px;
  background:rgba(255,255,255,0.06);
  border-radius:18px;
  box-shadow:0 40px 100px rgba(0,0,0,0.6);
  padding:24px;
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.08);
  overflow-y:auto;
}

.title{
  text-align:center;
  font-weight:700;
  font-size:1.2rem;
  margin-bottom:18px;
  background:linear-gradient(90deg,#00f2fe,#4facfe);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.material{
  margin-bottom:15px;
  text-align:center;
  color:#e2e8f0;
}

button{
  margin-top:10px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <div class="title"> Study Material</div>

  <div id="materials"></div>
</div>

<script>
async function loadMaterials(){
  const box = document.getElementById("materials");

  box.innerHTML = "Loading...";

  try {
    const res = await fetch("http://localhost:8000/documents/student-material", {
      headers: {
        "Authorization": "Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      box.innerHTML = "<p style='color:white'>No study material yet</p>";
      return;
    }

    let html = "";

    data.forEach(d => {
      html += `
        <div class="material">
          <h3>${d.title || d.filename}</h3>
          <p> Class: ${d.class_name}
          Type: ${d.type}</p>
          <button onclick="viewFile('${d._id}')">View</button>
        </div>
        <hr>
      `;
    });

    box.innerHTML = html;

  } catch(err){
    box.innerHTML = "<p style='color:white'>Error loading material</p>";
    console.log(err);
  }
}

function viewFile(id){
  window.open(`http://localhost:8000/documents/file/${id}`, "_blank");
}

loadMaterials();
</script>

</body>
</html>
