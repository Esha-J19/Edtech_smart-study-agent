<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Q&A</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

body {
  margin: 0;
  padding:0;
  font-family: 'Inter', sans-serif;
  display: flex;
  height: 100vh;
  background: linear-gradient(135deg,#0f172a,#1e293b);
}
.pdf-item{
  padding:10px;
  margin-top:10px;
  background:#1e293b;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  font-size:0.9rem;
}

.pdf-item:hover{
  background:#334155;
}
/* Container holding character and chat box */
.container {
  display: flex;
  align-items: center;
  gap: 40px;
}
.container.layout{
  display:flex;
  align-items:center;
  gap:40px;
  justify-content:flex-start;
  padding:0;
}
/* LEFT CHARACTER PANEL */
.character-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.character {
  width: 160px;
  height: 160px;
  background: radial-gradient(circle at 30% 30%, #ffe5d9, #ffafbd);
  border-radius: 50%;
  position: relative;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  animation: float 3s ease-in-out infinite;
}

/* Eyes */
.character::before, .character::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  background: #020617;
  border-radius: 50%;
  top: 50px;
}
.character::before { left: 40px; }
.character::after { right: 40px; }

/* Floating animation */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* Speech bubble */
.speech {
  margin-top: 20px;
  background: #334155;
  color: #e2e8f0;
  padding: 12px 18px;
  border-radius: 20px;
  max-width: 200px;
  text-align: center;
  font-weight: 600;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  animation: floatText 3s ease-in-out infinite alternate;
}

@keyframes floatText {
  0% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}

/* RIGHT CHAT BOX */
.chat-box {
  width: 400px;
  background: #1e293b;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  height: 80vh;
}

/* Header */
.chat-box header {
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  padding: 20px;
  font-size: 1.4rem;
  font-weight: 700;
  color: #020617;
  text-align: center;
}

/* Chat messages */
#chatBox {
  flex: 1;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  padding-bottom: 80px;
}

/* Messages */
.message {
  padding: 14px 18px;
  border-radius: 16px;
  max-width: 75%;
  word-wrap: break-word;
  line-height: 1.4;
  font-size: 0.95rem;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  white-space: pre-wrap;   
  overflow-wrap: break-word;
}

.student { 
  background: #4facfe;
  color: #020617;
  align-self: flex-end;
  border-bottom-right-radius: 0;
}

.bot { 
  background: #334155;
  color: #e2e8f0;
  align-self: flex-start;
  border-bottom-left-radius: 0;
  max-width: 85%;
  padding-right: 10px;
  box-sizing: border-box; 
}

/* Input row */
.input-row {
  display: flex;
  gap: 10px;
  padding: 15px;
  border-top: 1px solid #334155;
  background: #1e293b;

}

input {
  flex: 1;
  padding: 12px 16px;
  border-radius: 16px;
  border: none;
  background: #0f172a;
  color: #e2e8f0;
  font-size: 0.95rem;
  outline: none;
}

input::placeholder { color: #94a3b8; }

button {
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  border: none;
  border-radius: 16px;
  padding: 12px 16px;
  color: #020617;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 8px 20px rgba(79,172,254,0.5);
}

#chatBox { scroll-behavior: smooth; }

@media(max-width:900px){
  .container { flex-direction: column; gap: 30px; }
  .chat-box { width: 90%; }
}
.layout{
  display:flex;
  height:100vh;
}

/*  LEFT PANEL */
.pdf-sidebar{
  width:260px;
  height:100vh; 
  background:#020617;
  border-right:1px solid #334155;
  padding:15px;
  overflow-y:auto;
  color:#38bdf8
}

/*  FILE ITEM */
.pdf-item{
  padding:10px;
  margin-bottom:10px;
  background:#1e293b;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.pdf-item:hover{
  background:#334155;
}

/*  RIGHT SIDE */
.main-content{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}
.pdf-title{
  color:#38bdf8;
  font-size:1.2rem;
  font-weight:600;
  letter-spacing:0.5px;
}
</style>
</head>
<body>

<div class="container layout">

  <!--  LEFT SIDEBAR -->
  <div class="pdf-sidebar" id="pdfList">
    <h3 style="color:#38bdf8;">📄 Documents</h3>
  </div>

  <div class="character-panel">
  <div class="character"></div>
  <div class="speech" id="speechBubble">💡 Hello! Ask me a question.</div>
</div>

<div class="chat-box">
  <header>Student Q&A</header>
  <div id="chatBox"></div>
  <div class="input-row">
    <input type="text" id="questionInput" placeholder="Type your question...">
    <button id="sendBtn">Send</button>
  </div>
</div>

</div>



<script>
let lastAnswer = "";
const BASE_URL = "http://127.0.0.1:8000";
const chatBox = document.getElementById("chatBox");
const questionInput = document.getElementById("questionInput");
const sendBtn = document.getElementById("sendBtn");
const speech = document.getElementById("speechBubble");

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerHTML = marked.parse(text);
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}



function updateSpeech(text) {
  speech.innerText = text;
  setTimeout(()=>{ speech.innerText = " Hello! Ask me a question."; }, 4000);
}


/*  CALL FUNCTION ON LOAD */
loadPDFSidebar();
sendBtn.addEventListener("click", async () => {

  let question = questionInput.value.trim();
  console.log("Selected PDFs:", selectedPDFs);
  let finalQuestion = question;


if (
  question.toLowerCase().includes("short") ||
  question.toLowerCase().includes("summarize")
) {
  if (lastAnswer) {
    finalQuestion = `
Summarize the following answer in 2-3 lines only:

${lastAnswer}
`;
  }
}
if (question.toLowerCase().includes("bullet")) {
  if (lastAnswer) {
    finalQuestion = `
Convert the following answer into bullet points:

${lastAnswer}
`;
  }
}
  if(!question) return;
  console.log("SELECTED PDFs:", selectedPDFs);
  addMessage(question, "student");

  questionInput.value = "";

  addMessage("Thinking...", "bot");

  try{

    const res = await fetch(`${BASE_URL}/documents/ask-from-docs`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + localStorage.getItem("token")
      },
      body:JSON.stringify({
        doc_ids: selectedPDFs,   // ek PDF select karo
        question: finalQuestion
      })
    });

    const data = await res.json();

    chatBox.lastChild.innerHTML = marked.parse(data.response);
    lastAnswer = data.response;
    updateSpeech(data.response);

  }catch(err){

    chatBox.lastChild.innerText = " Server error";

  }

});
let selectedPDFs = [];

function selectPDF(id, element){

  if(selectedPDFs.includes(id)){
    selectedPDFs = selectedPDFs.filter(x => x !== id);
    element.style.background = "#1e293b";
  } else {
    selectedPDFs.push(id);
    element.style.background = "#0ea5e9";
  }
  console.log("Selected PDFs:", selectedPDFs);
}
async function loadPDFSidebar(){
  console.log("LOADING PDFs...");
  try{
    const res = await fetch(`${BASE_URL}/documents`,{
      headers:{
        "Authorization": "Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();
    console.log("LOADING PDFs...");
    const list = document.getElementById("pdfList");

    list.innerHTML = "<h3>📄 Documents</h3>";

    //  CASE 1: NOT AUTHENTICATED
    if(data.detail){
      console.log("Auth Error:", data);
      list.innerHTML += "<p> Login required</p>";
      return;
    }

    // CASE 2: NORMAL RESPONSE
    const docs = data.documents || data;
    console.log("Docs:", docs);
    if(!docs || docs.length === 0){
      list.innerHTML += "<p>No documents found</p>";
      return;
    }

    docs.forEach(doc => {

      const div = document.createElement("div");
      div.className = "pdf-item";
      const name = document.createElement("span");
      name.innerText = doc.filename || doc.file_name;
      const delBtn = document.createElement("span");
      delBtn.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
      fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
      `;
      delBtn.style.float = "right";
      delBtn.style.cursor = "pointer";
      delBtn.style.opacity = "0";       
      delBtn.style.transition = "0.2s";
      div.onmouseover = () => {
      delBtn.style.opacity = "1";
      };

      div.onmouseout = () => {
      delBtn.style.opacity = "0";
      };

      delBtn.onmouseover = () => {
      delBtn.querySelector("svg").setAttribute("fill", "#ef4444");
      };

      delBtn.onmouseout = () => {
      delBtn.querySelector("svg").setAttribute("fill", "#94a3b8");
      };
      delBtn.onclick = (e) => {
      e.stopPropagation();   
      deletePDF(doc.id, div);
  };
div.appendChild(name);
div.appendChild(delBtn);

div.onclick = () => selectPDF(doc.id, div);

list.appendChild(div);
});
  }catch(err){
    console.log("Error loading PDFs:", err);
  }

}

async function deletePDF(id, element){

  if(!confirm("Delete this PDF?")) return;

  try{
    const res = await fetch(`${BASE_URL}/documents/delete/${id}`,{
      method: "DELETE",
      headers:{
        "Authorization": "Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();

    if(res.ok){
      element.remove();

     
      selectedPDFs = selectedPDFs.filter(x => x !== id);

      console.log("Deleted:", id);
    } else {
      alert(data.detail || "Delete failed");
    }

  }catch(err){
    alert("Server error");
  }
}

loadPDFSidebar();
questionInput.addEventListener("keypress", function(e) {
  if(e.key === "Enter") {
    e.preventDefault();
    sendBtn.click();
  }
});
//loadPDFSidebar(); //
</script>

</body>
</html>
