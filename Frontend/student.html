<script>
const BASE_URL = "http://127.0.0.1:8000";
const docInput = document.getElementById("docInput");

/* ---------------- DOCUMENT UPLOAD ONLY ---------------- */

function uploadDoc(){
  docInput.click();
}

docInput.onchange = async () => {
  const file = docInput.files[0];
  if(!file) return;

  const token = localStorage.getItem("token");
  if(!token){
    alert("Please login again");
    return;
  }

  //  SHOW CHIP IMMEDIATELY
  const chip = document.getElementById("uploadChip");
  document.getElementById("fileName").innerText = file.name;
  document.getElementById("uploadStatus").innerText = "Uploading...";
  chip.style.display = "flex";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("class_code", "demo123");
  formData.append("title", file.name);
  formData.append("material_type", "pdf");
  formData.append("class_name", "Demo Class");

  try{
    const res = await fetch(`${BASE_URL}/documents/upload`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`
      },
      body: formData
    });
    
    const data = await res.json();
    console.log("UPLOAD RESPONSE:", data);
    if(!res.ok){
      document.getElementById("uploadStatus").innerText = "❌ Failed";
       setTimeout(() => {
    chip.style.display = "none";
  }, 3000);

      return;
    }

    //  SUCCESS STATE
    document.getElementById("uploadStatus").innerText = "✔ Uploaded";
  //  OPTIONAL: refresh sidebar if same page
    if (typeof loadPDFSidebar === "function") {
      loadPDFSidebar();
    }
    setTimeout(() => {
    const chip = document.getElementById("uploadChip");
    chip.style.opacity = "0";
    chip.style.transform = "translateY(10px)";

  setTimeout(() => {
    chip.style.display = "none";
    chip.style.opacity = "1";
    chip.style.transform = "translateY(0)";
  }, 300);
}, 3000);

    // optional: 3 sec baad chip hide

  }catch(err){
    document.getElementById("uploadStatus").innerText = " Error";
    setTimeout(() => {
    chip.style.display = "none";
  }, 3000);
  }
};
/*-----------------MERMAID TEXT---------------------------------*/
function cleanMermaid(text){

  // remove code blocks
  text = text.replace(/```/g, "");

  // extract only graph TD part
  const match = text.match(/graph TD[\s\S]*/);
  if(match){
    text = match[0];
  }

  const lines = text.split("\n");
  const clean = ["graph TD"];

  lines.forEach(line => {
    line = line.trim();

    if(line.includes("-->")){

      
      let parts = line.split("-->");
      if(parts.length === 2){
        let left = parts[0].trim();
        let right = parts[1].trim();

        
        if(!left.includes("[")) left += "[Node]";
        if(!right.includes("[")) right += "[Node]";

        // remove extra junk
        left = left.replace(/[^a-zA-Z0-9\[\]\s]/g, "");
        right = right.replace(/[^a-zA-Z0-9\[\]\s]/g, "");

        clean.push(`${left} --> ${right}`);
      }
    }
  });

  return clean.join("\n");
}

/* ---------------- LOAD REAL USER FROM BACKEND ---------------- */

(function loadUser(){
  const token = localStorage.getItem("token");
  if(!token){

}

  fetch(`${BASE_URL}/auth/me`, {

  .catch(() => {
  console.log("Auth error");
});

/* ---------------- LOGOUT ---------------- */

function logout(){

}

async function askAI(){

  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text) return;

  const chatBox = document.getElementById("chatMessages");

  //  USER MESSAGE
  chatBox.innerHTML += `
    <div class="chat-msg user">${text}</div>
  `;

  input.value = "";

  let endpoint = "/chat/ask";
  let body = {};

  const lower = text.toLowerCase();

  if(lower.includes("summarize")){
  endpoint = "/chat/ask";
  body = { prompt: text };
}
else if(lower.includes("quiz")){
  endpoint = "/chat/quiz";

  const num_mcq = prompt("How many MCQs?");
  const num_subjective = prompt("How many subjective questions?");
  const difficulty = prompt("Difficulty? (easy / medium / hard)");

  body = {
    topic: text,
    num_mcq: parseInt(num_mcq) || 3,
    num_subjective: parseInt(num_subjective) || 1,
    difficulty: difficulty || "medium"
  };
}
else if(lower.includes("diagram")){
  endpoint = "/chat/visualize";
  body = { text };
}
else{
  endpoint = "/chat/ask";
  body = { prompt: text };
}
  

  //  BOT LOADING
  chatBox.innerHTML += `
    <div class="chat-msg bot" id="loading">Thinking...</div>
  `;

  try{
    const res = await fetch(`${BASE_URL}${endpoint}`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    document.getElementById("loading").remove();

let output = "";

//  PRIORITY: diagram first
if (data.diagram) {
  output = data.diagram;
}
else if (data.response && typeof data.response === "string") {
  output = data.response;
}
else if (data.response && data.response.response) {
  output = data.response.response;
}
else {
  output = JSON.stringify(data, null, 2);
}

  //  ADD THIS HERE
  //  DIAGRAM OR NORMAL RESPONSE
if(output.includes("graph TD")){

  const cleanDiagram = cleanMermaid(output);

  
  if(cleanDiagram.trim() === "graph TD"){
    chatBox.innerHTML += `
      <div class="chat-msg bot">
         Diagram generation failed. Try again.
      </div>
    `;
  } else {

    const id = "mermaid_" + Date.now();

    chatBox.innerHTML += `
      <div class="chat-msg bot">
        <div class="mermaid" id="${id}">
          ${cleanDiagram}
        </div>
      </div>
    `;

    // SAFE RENDER
    try {
      const el = document.getElementById(id);
      if(el){
        mermaid.run({
          nodes: [el]
        });
      }
    } catch (err) {
      console.error("MERMAID CRASH:", err);

      document.getElementById(id).innerHTML = `
         Invalid diagram generated
      `;
    }
  }

} else {

  //  NORMAL TEXT RESPONSE
  chatBox.innerHTML += `
    <div class="chat-msg bot">
      ${output.replace(/\\n/g, "<br>")}
    </div>
  `;
}

//  ALWAYS KEEP THIS
chatBox.scrollTop = chatBox.scrollHeight;
  }
  catch(err){
  console.error(err);

  document.getElementById("loading").innerText = "Error";
}
}


async function loadChatHistory() {

  const res = await fetch(`${BASE_URL}/chat/history`, {
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  });

  const chats = await res.json();

  const historyDiv = document.getElementById("chatHistory");
  historyDiv.innerHTML = "";

  chats.forEach(chat => {

  let questionsHTML = "";   

  //  FIX: a → chat
  chat.questions.forEach((q, i) => {
    questionsHTML += `
      <p>${i+1}. ${q.question} (${q.marks} marks) ${q.optional ? "(Optional)" : ""}</p>
    `;
  });

  const div = document.createElement("div");

  div.innerHTML = `
    <h3>${chat.title}</h3>
    <p><b>Course:</b> ${chat.course_name}</p>
    <p><b>Teacher:</b> ${chat.teacher_name}</p>
    <p><b>Due Date:</b> ${chat.due_date}</p>

    <h4>Questions:</h4>
    ${questionsHTML}

    <a href="http://127.0.0.1:8000/student/assignment-pdf/${chat._id}" target="_blank">
      📄 View PDF
    </a>
  `;

  historyDiv.appendChild(div);
});

}
