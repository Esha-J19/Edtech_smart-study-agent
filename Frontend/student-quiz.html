<div id="quiz"></div>

<style>
  
body {
  background: linear-gradient(to right, #0f172a, #1e293b);
  font-family: Arial, sans-serif;
  color: white;
}

h2 {
  text-align: center;
  color: #3b82f6;
  font-size: 32px;
  margin-bottom: 30px;
}

.quiz-card {
  background: #1e293b;
  padding: 20px;
  margin: 20px auto;
  border-radius: 12px;
  width: 60%;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.quiz-card h3 {
  margin-bottom: 10px;
}

.quiz-card p {
  margin: 5px 0;
}

.attempted {
  color: #22c55e;
  font-weight: bold;
}

.start-btn {
  margin-top: 10px;
  padding: 8px 15px;
  background: #3b82f6;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.start-btn:hover {
  background: #2563eb;
}
</style>

<script>
let currentQuiz = null;
let answers = [];
let timer;

let allQuizzes = [];

async function loadQuiz() {
  try {
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Please login first!");
      return;
    }

    const res = await fetch("http://localhost:8000/quiz/student", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (!res.ok) {
      throw new Error("API failed");
    }

    const data = await res.json();
console.log("Quiz Data:", data);

// null check
if (!data || !Array.isArray(data)) {
  document.getElementById("quiz").innerHTML =
    "<p>No quizzes available or error loading</p>";
  return;
}

allQuizzes = data;

    let html = "<h2>Available Quizzes</h2>";

data.forEach((q, i) => {
  html += `
    <div class="quiz-card">
      <h3>${q.title}</h3>

      <p><b>Class:</b> ${q.class_name} (${q.class_code})</p>
      <p><b>Time Left:</b> ${q.remaining_time} sec</p>
  `;

  if (q.attempted) {
    html += `<p class="attempted"> Attempted  Score: ${q.score}</p>`;
  } else {
    html += `<button class="start-btn" onclick="startQuiz(${i})">Start Quiz</button>`;
  }

  html += `</div>`;
});
    document.getElementById("quiz").innerHTML = html;

  } catch (err) {
    console.error("Error:", err);
  }
}

function startQuiz(index) {

  
  if (timer) {
    clearInterval(timer);
  }

  currentQuiz = allQuizzes[index];
  answers = [];

  
  if (currentQuiz.remaining_time <= 0) {
    alert("Quiz expired");
    return;
  }

  let timeLeft = currentQuiz.remaining_time;

  let html = `
    <h2>${currentQuiz.title}</h2>
    <p>Time Left: <span id="timer">${timeLeft}</span> sec</p>
  `;

  currentQuiz.questions.forEach((q, i) => {
    html += `<p>${i+1}. ${q.question}</p>`;

    q.options.forEach((opt, idx) => {
      html += `
        <label>
          <input type="radio" name="q${i}"
          onchange="answers[${i}]='${String.fromCharCode(65+idx)}'">
          ${opt}
        </label><br>
      `;
    });
  });

  html += `<button onclick="submitQuiz()">Submit</button>`;

  document.getElementById("quiz").innerHTML = html;

  //  REAL TIMER
  timer = setInterval(() => {
    timeLeft--;

    const timerEl = document.getElementById("timer");
    if (timerEl) {
      timerEl.innerText = timeLeft;
    }

    
    if (timeLeft <= 0) {
      clearInterval(timer);
      alert("Time up!");
      submitQuiz();
    }

  }, 1000);
}

async function submitQuiz() {
  clearInterval(timer);

  const res = await fetch("http://localhost:8000/quiz/submit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({
      quiz_id: currentQuiz._id,
      answers: answers
    })
  });

  const data = await res.json();

  // ERROR HANDLE FIRST
  if (!res.ok) {
    alert(data.detail);
    loadQuiz();
    return;
  }

  let review = `<h2>Score: ${data.score}/${data.total}</h2>`;

  data.result.forEach((r, i) => {
    review += `
      <p>${i+1}. ${r.question}</p>
      <p>Your: ${r.your_answer || "Not Answered"}</p>
      <p>Correct: ${r.correct_answer}</p>
      <p style="color:${r.is_correct ? "green" : "red"}">
        ${r.is_correct ? "Correct" : "Wrong"}
      </p><hr>
    `;
  });

  document.getElementById("quiz").innerHTML = review;

  currentQuiz = null;
}

loadQuiz();
</script>
